<script>


/*****************************************
ตัวแปรหลัก
******************************************/

let jobs = [];

let currentRow = null;


let beforeImage = "";

let afterImage = "";




/*****************************************
โหลดระบบ
******************************************/


window.onload = function(){

    refreshData();

};




/*****************************************
ดึงข้อมูลจาก Apps Script
******************************************/


function refreshData(){


document.getElementById(
"jobContainer"
).innerHTML =
"<div class='loading'>กำลังโหลดข้อมูล...</div>";



google.script.run

.withSuccessHandler(function(data){


jobs = data;


showJobs();


})


.withFailureHandler(function(err){

alert(
"โหลดข้อมูลไม่สำเร็จ\n"
+
err.message
);

})


.getJobs();


}

     Modal : รายงาน PDF
================================================== -->


<div class="modal fade"
id="reportModal"
tabindex="-1">


<div class="modal-dialog">


<div class="modal-content">


<div class="modal-header bg-dark text-white">

</button>

<!-- Bootstrap JS -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

/*****************************************
 แสดงรายการงาน
******************************************/
function showJobs(){

 let contractor =
 document.getElementById(
 "contractorSelect"
 ).value;


 let container =
 document.getElementById(
 "jobContainer"
 );


 if(!contractor){

  container.innerHTML =
  "<div class='loading'>กรุณาเลือกผู้รับเหมา</div>";

  return;
 }


 let list = jobs.filter(
 item => item.contractor === contractor
 );


 updateSummary(list);


 if(list.length === 0){

  container.innerHTML =
  `
  <div class="alert alert-warning">
  ไม่พบรายการงาน
  </div>
  `;

  return;

 }


 let html = "";


 list.forEach(item=>{


 let status = "";


 if(item.photo){

  let p = item.photo.split("||");


  if(p[0] && p[1]){

   status =
   `<span class="badge bg-success">
   ส่งงานแล้ว
   </span>`;

  }else{

   status =
   `<span class="badge bg-info">
   ทำบางส่วน
   </span>`;

  }

 }else{

  status =
  `<span class="badge bg-warning text-dark">
  รอดำเนินการ
  </span>`;

 }



 html += `

 <div 
 class="card p-3 mb-2 job-item"
 onclick="openDetail(${item.rowNum})">

 <div class="d-flex justify-content-between">

 <div>

 <b>
 ${item.type}
 </b>

 -
 ${item.feeder}

 <br>

 ${item.job}

 </div>


 <div>

 ${status}

 </div>


 </div>

 </div>

 `;


 });


 container.innerHTML = html;


}



/*****************************************
 สรุปสถานะ
******************************************/
function updateSummary(list){


 let done = 0;
 let wait = 0;
 let part = 0;


 list.forEach(item=>{


 if(!item.photo){

  wait++;

 }
 else{

  let p =
  item.photo.split("||");


  if(p[0] && p[1]){

   done++;

  }
  else{

   part++;

  }

 }


 });


 document.getElementById(
 "totalCount"
 ).innerText =
 list.length;


 document.getElementById(
 "doneCount"
 ).innerText =
 done;


 document.getElementById(
 "waitCount"
 ).innerText =
 wait;


 document.getElementById(
 "partCount"
 ).innerText =
 part;


}




/*****************************************
 เปิดรายละเอียดงาน
******************************************/
function openDetail(row){


 currentRow = row;


 let job =
 jobs.find(
 x => x.rowNum == row
 );


 document.getElementById(
 "jobTitle"
 ).innerText =
 job.feeder;


 document.getElementById(
 "viewContractor"
 ).innerText =
 job.contractor;


 document.getElementById(
 "viewJob"
 ).innerText =
 job.job;


 let before = "";
 let after = "";


 if(job.photo){

 let p =
 job.photo.split("||");


 before = p[0] || "";
 after = p[1] || "";

 }


 document.getElementById(
 "oldBefore"
 ).src =
 before;


 document.getElementById(
 "oldAfter"
 ).src =
 after;


 beforeImage = "";
 afterImage = "";


 document.getElementById(
 "beforeBox"
 ).innerHTML =
 '<i class="fa fa-camera fa-2x"></i><br>เพิ่มรูป';


 document.getElementById(
 "afterBox"
 ).innerHTML =
 '<i class="fa fa-camera fa-2x"></i><br>เพิ่มรูป';


new bootstrap.Modal(
 document.getElementById("detailModal")
).show();


}




/*****************************************
 อ่านรูปเป็น Base64
******************************************/
function readImage(input,type){


 let file =
 input.files[0];


 if(!file)
 return;


 if(file.size >
 10 * 1024 * 1024){

 alert(
 "รูปต้องไม่เกิน 10 MB"
 );

 return;

 }


 let reader =
 new FileReader();


 reader.onload =
 function(e){


 if(type=="before"){

 beforeImage =
 e.target.result;


 document.getElementById(
 "beforeBox"
 ).innerHTML =
 `<img src="${beforeImage}"
 class="preview-img">`;


 }
 else{

 afterImage =
 e.target.result;


 document.getElementById(
 "afterBox"
 ).innerHTML =
 `<img src="${afterImage}"
 class="preview-img">`;


 }


 };


 reader.readAsDataURL(file);


}





/*****************************************
 บันทึกรูป
******************************************/
function uploadPhoto(){


 if(!beforeImage &&
 !afterImage){

 alert(
 "กรุณาเลือกรูป"
 );

 return;

 }


 let data =
 beforeImage +
 "||" +
 afterImage;


 google.script.run


 .withSuccessHandler(
 function(res){

 alert(
 res.message
 );

 bootstrap.Modal
 .getInstance(
 document.getElementById(
 "detailModal"
 )
 ).hide();


 refreshData();


 })

 .withFailureHandler(
 function(err){

 alert(
 err.message
 );

 })

 .savePhoto(
 currentRow,
 data
 );


}





/*****************************************
 เปิดหน้าสร้างงาน
******************************************/
function openCreateModal(){

 new bootstrap.Modal(
 document.getElementById(
 "createModal")
 ).show();

}
/*****************************************
 บันทึกงานใหม่
******************************************/
function saveJob(){

 let contractor =
 document.getElementById(
 "contractorSelect"
 ).value;


 let type =
 document.getElementById(
 "mvType"
 ).checked
 ? "MV"
 : "LV";


 let feeder =
 document.getElementById(
 "feederInput"
 ).value;


 let job =
 document.getElementById(
 "jobInput"
 ).value.trim();


 if(!contractor){

  alert(
 "กรุณาเลือกผู้รับเหมา"
 );

 return;

 }


 if(!job){

 alert(
 "กรุณากรอกสถานที่งาน"
 );

 return;

 }


 let data = {
 contractor: contractor,
 type: type,
 feeder: feeder,
 job: job
 };


 google.script.run

 .withSuccessHandler(function(msg){


 alert(msg);


 bootstrap.Modal
 .getInstance(
 document.getElementById("createModal")
 ).hide();


 document.getElementById(
 "jobInput"
 ).value="";


 refreshData();


 })


 .withFailureHandler(function(err){

 alert(
 err.message
 );

 })

 .createJob(data);

}





/*****************************************
 เปิดรายงาน
******************************************/
function openReportModal(){

 let contractor =
 document.getElementById(
 "contractorSelect"
 ).value;


 if(!contractor){

 alert(
 "กรุณาเลือกผู้รับเหมา"
 );

 return;

 }


 let select =
 document.getElementById(
 "reportFeeder"
 );


 select.innerHTML =
 "<option value='ALL'>ทั้งหมด</option>";


 google.script.run

 .withSuccessHandler(function(list){


 list.forEach(function(f){

 select.innerHTML +=
 `<option value="${f}">
 ${f}
 </option>`;

 });


 })


 .getFeederList(contractor);



 new bootstrap.Modal(
 document.getElementById(
 "reportModal"
 )
 ).show();


}





/*****************************************
 พิมพ์ PDF
******************************************/
function printReport(){


 let filter = {


 contractor:
 document.getElementById(
 "contractorSelect"
 ).value,


 feeder:
 document.getElementById(
 "reportFeeder"
 ).value,


 keyword:
 document.getElementById(
 "reportKeyword"
 ).value


 };



 google.script.run


 .withSuccessHandler(function(data){


 let html = "";


 data.forEach(function(item){


 let before = "";
 let after = "";


 if(item.photo){

 let p =
 item.photo.split("||");


 before = p[0] || "";
 after = p[1] || "";

 }



 html += `


 <tr>


 <td>
 ${item.type}
 <br>
 ${item.feeder}
 </td>


 <td>
 ${item.job}
 </td>


 <td>
 <img src="${before}"
 style="
 width:120px;
 height:120px;
 object-fit:contain;">
 </td>


 <td>
 <img src="${after}"
 style="
 width:120px;
 height:120px;
 object-fit:contain;">
 </td>


 </tr>


 `;


 });


 let w =
 window.open();


 w.document.write(`


 <html>


 <head>


 <title>
 รายงาน
 </title>


 <style>


 body{
 font-family:tahoma;
 }


 table{
 width:100%;
 border-collapse:collapse;
 }


 th,td{
 border:1px solid #000;
 padding:5px;
 text-align:center;
 }


 </style>


 </head>


 <body>


 <h2 align="center">
 รายงานการปฏิบัติงาน
 </h2>


 <table>


 <tr>

 <th>
 ประเภท/Feeder
 </th>

 <th>
 สถานที่
 </th>

 <th>
 ก่อนตัด
 </th>

 <th>
 หลังตัด
 </th>


 </tr>


 ${html}


 </table>


 <br>


 <button onclick="window.print()">
 พิมพ์ PDF
 </button>


 </body>


 </html>


 `);


 w.document.close();


 })

 .getReportData(filter);


}

</script>


</body>


</html>
