<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบงานผู้รับเหมา</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h3>รายการงานในระบบ</h3>
    <div id="app" class="mt-3">กำลังโหลดข้อมูล...</div>

    <script>
        // ใส่ URL Web App อันใหม่ที่ได้จากการ Deploy ล่าสุด (ต้องเป็นอันที่เพิ่งกด New Version)
        const API_URL = "https://script.google.com/macros/s/AKfycbx32DWQgjDRuxRyYRYQsAoNQfPW-DQ1yu7LmrcnXrUPtPRC2bvJ3goAP_a27avR8h7Pqw/exec"; 

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let html = '<table class="table table-bordered"><thead><tr><th>ผู้รับเหมา</th><th>งาน</th></tr></thead><tbody>';
                data.forEach(item => {
                    html += `<tr><td>${item.contractor}</td><td>${item.job}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('app').innerHTML = html;
            } catch (err) {
                document.getElementById('app').innerHTML = `<div class="alert alert-danger">เชื่อมต่อล้มเหลว: ${err.message}</div>`;
            }
        }
        init();
    </script>
</body>
</html>
