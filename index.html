<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
    <div id="app">กำลังเชื่อมต่อข้อมูล...</div>

    <script>
        // นำ URL เว็บแอปใหม่ที่เพิ่ง Deploy มาวางที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbx32DWQgjDRuxRyYRYQsAoNQfPW-DQ1yu7LmrcnXrUPtPRC2bvJ3goAP_a27avR8h7Pqw/exec"; 

        async function init() {
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                const data = await response.json();
                
                let html = '<table class="table"><thead><tr><th>ผู้รับเหมา</th><th>งาน</th></tr></thead><tbody>';
                data.forEach(item => {
                    html += `<tr><td>${item.contractor}</td><td>${item.job}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('app').innerHTML = html;
            } catch (err) {
                document.getElementById('app').innerHTML = 'เกิดข้อผิดพลาด: ' + err;
            }
        }
        init();
    </script>
</body>
</html>
