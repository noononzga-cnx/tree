<script>
  // นำ URL เว็บแอปที่คัดลอกมา มาวางตรงนี้ในเครื่องหมายคำพูด
  const API_URL = "https://script.google.com/macros/s/AKfycbxXxD0kHtztBAX9iATzMMsK7g388HI_lBOw-ga5QyRr1GlvOZ1-oB1ka3dDBs1Mem_6/exec"; 

  async function loadData() {
    const app = document.getElementById('app');
    try {
      const response = await fetch(API_URL);
      const jobs = await response.json();
      
      let html = '<table class="table table-striped"><thead><tr><th>งาน</th><th>สถานที่</th></tr></thead><tbody>';
      jobs.forEach(job => {
        html += `<tr><td>${job.type}</td><td>${job.job}</td></tr>`;
      });
      html += '</tbody></table>';
      app.innerHTML = html;
    } catch (err) {
      app.innerHTML = '<div class="alert alert-danger">เชื่อมต่อข้อมูลไม่ได้: ' + err.message + '</div>';
    }
  }
  loadData();
</script>
