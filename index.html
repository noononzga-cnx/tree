<script>

/*****************************************
 ตัวแปรหลักของระบบ
******************************************/

let jobs = [];

let currentRow = null;

let beforeImage = "";

let afterImage = "";

let createModal = null;

let detailModal = null;

let reportModal = null;



/*****************************************
 โหลดระบบครั้งแรก
******************************************/

window.onload = function(){

    createModal = new bootstrap.Modal(
        document.getElementById("createModal")
    );

    detailModal = new bootstrap.Modal(
        document.getElementById("detailModal")
    );

    reportModal = new bootstrap.Modal(
        document.getElementById("reportModal")
    );

    refreshData();

};




/*****************************************
 โหลดข้อมูลจาก Google Sheets
******************************************/

function refreshData(){

    document.getElementById("jobContainer")
    .innerHTML =
    "<div class='loading'>กำลังโหลดข้อมูล...</div>";


    google.script.run

    .withSuccessHandler(function(data){

        jobs = data || [];

        showJobs();

    })


    .withFailureHandler(function(err){

        alert(
        "โหลดข้อมูลไม่สำเร็จ\n" +
        err.message
        );

    })


    .getJobs();

}





/*****************************************
 แสดงรายการงาน
******************************************/

function showJobs(){


    let contractor =
    document.getElementById(
    "contractorSelect"
    ).value;


    let container =
    document.getElementById(
    "jobContainer"
    );


    if(!contractor){

        container.innerHTML =
        "<div class='loading'>กรุณาเลือกผู้รับเหมา</div>";

        resetSummary();

        return;

    }


    let list =
    jobs.filter(function(item){

        return item.contractor === contractor;

    });



    updateSummary(list);


    if(list.length === 0){

        container.innerHTML =
        `
        <div class="alert alert-warning">
        ยังไม่มีรายการงาน
        </div>
        `;

        return;

    }



    let html = "";


    list.forEach(function(item){


        let status = getStatusBadge(item.photo);



        html += `

        <div class="card mb-2 p-3 job-item"
        onclick="openDetail(${item.rowNum})">


        <div class="d-flex justify-content-between">


        <div>

        <b>
        ${item.type}
        </b>

        |
        ${item.feeder}

        <br>

        ${item.job}


        </div>


        <div>

        ${status}

        </div>


        </div>


        </div>

        `;


    });



    container.innerHTML = html;


}




/*****************************************
 แสดง Badge สถานะงาน
******************************************/

function getStatusBadge(photo){


    if(!photo){

        return `
        <span class="badge bg-warning text-dark">
        รอดำเนินการ
        </span>`;
    }


    let img = photo.split("||");


    if(img[0] && img[1]){

        return `
        <span class="badge bg-success">
        เสร็จสิ้น
        </span>`;
    }


    return `
    <span class="badge bg-info">
    ดำเนินการบางส่วน
    </span>`;

}




/*****************************************
 อัปเดต Dashboard
******************************************/

function updateSummary(list){


    let done = 0;
    let wait = 0;
    let part = 0;


    list.forEach(function(item){


        let status =
        getStatusBadge(item.photo);


        if(status.includes("เสร็จ")){

            done++;

        }
        else if(status.includes("บางส่วน")){

            part++;

        }
        else{

            wait++;

        }


    });


    document.getElementById("totalCount")
    .innerText = list.length;


    document.getElementById("doneCount")
    .innerText = done;


    document.getElementById("waitCount")
    .innerText = wait;


    document.getElementById("partCount")
    .innerText = part;


}




/*****************************************
 รีเซต Dashboard
******************************************/

function resetSummary(){

    document.getElementById("totalCount").innerText = 0;

    document.getElementById("doneCount").innerText = 0;

    document.getElementById("waitCount").innerText = 0;

    document.getElementById("partCount").innerText = 0;

}




/*****************************************
 เปิดหน้าสร้างงาน
******************************************/

function openCreateModal(){

    document.getElementById("jobInput").value = "";

    createModal.show();

}




/*****************************************
 เปิดรายละเอียดงาน
******************************************/

function openDetail(row){


    currentRow = row;


    let job =
    jobs.find(function(item){

        return item.rowNum == row;

    });


    if(!job){

        alert("ไม่พบข้อมูลงาน");

        return;

    }


    document.getElementById("jobTitle")
    .innerText =
    job.feeder;


    document.getElementById("viewContractor")
    .innerText =
    job.contractor;


    document.getElementById("viewJob")
    .innerText =
    job.job;


    let before = "";
    let after = "";


    if(job.photo){

        let img =
        job.photo.split("||");

        before = img[0] || "";

        after = img[1] || "";

    }


    document.getElementById("oldBefore").src = before;

    document.getElementById("oldAfter").src = after;


    beforeImage = "";
    afterImage = "";


    document.getElementById("beforeBox").innerHTML =
    '<i class="fa fa-camera fa-2x"></i><br>กดเพื่อเลือกรูป';


    document.getElementById("afterBox").innerHTML =
    '<i class="fa fa-camera fa-2x"></i><br>กดเพื่อเลือกรูป';


    detailModal.show();


}
/*****************************************
 อ่านรูปจากเครื่องและแปลง Base64
******************************************/
function readImage(input, type){

    let file = input.files[0];

    if(!file){
        return;
    }


    // จำกัดขนาดรูป 10 MB
    if(file.size > 10 * 1024 * 1024){

        alert("รูปภาพต้องมีขนาดไม่เกิน 10 MB");

        input.value = "";

        return;

    }


    let reader = new FileReader();


    reader.onload = function(e){


        let imageData = e.target.result;


        if(type === "before"){

            beforeImage = imageData;


            document.getElementById("beforeBox")
            .innerHTML =
            `
            <img 
            src="${imageData}"
            class="preview-img">
            `;

        }


        if(type === "after"){


            afterImage = imageData;


            document.getElementById("afterBox")
            .innerHTML =
            `
            <img 
            src="${imageData}"
            class="preview-img">
            `;

        }

    };


    reader.readAsDataURL(file);

}




/*****************************************
 บันทึกรูปภาพ
******************************************/
function uploadPhoto(){


    if(!beforeImage && !afterImage){

        alert("กรุณาเลือกรูปภาพก่อนบันทึก");

        return;

    }


    let photoData = 
        beforeImage +
        "||" +
        afterImage;


    google.script.run

    .withSuccessHandler(function(result){


        alert(result.message);


        detailModal.hide();


        refreshData();


    })


    .withFailureHandler(function(err){


        alert(
        "บันทึกรูปไม่สำเร็จ\n" +
        err.message
        );


    })


    .savePhoto(
        currentRow,
        photoData
    );


}




/*****************************************
 สร้างงานใหม่
******************************************/
function saveJob(){


    let contractor =
    document.getElementById("contractorSelect")
    .value;


    if(!contractor){

        alert("กรุณาเลือกผู้รับเหมา");

        return;

    }


    let type =
    document.getElementById("mvType").checked
    ? "MV"
    : "LV";


    let feeder =
    document.getElementById("feederInput")
    .value;


    let job =
    document.getElementById("jobInput")
    .value
    .trim();


    if(job === ""){

        alert("กรุณากรอกสถานที่ปฏิบัติงาน");

        return;

    }


    let data = {

        contractor : contractor,

        type : type,

        feeder : feeder,

        job : job

    };



    google.script.run


    .withSuccessHandler(function(result){


        alert(result.message);


        document.getElementById("jobInput")
        .value = "";


        createModal.hide();


        refreshData();


    })


    .withFailureHandler(function(err){


        alert(
        "สร้างงานไม่สำเร็จ\n" +
        err.message
        );


    })


    .createJob(data);


}




/*****************************************
 เปลี่ยนรายการ Feeder ตาม MV / LV
******************************************/

document.addEventListener(
"change",
function(e){


    if(
    e.target.id !== "mvType" &&
    e.target.id !== "lvType"
    ){
        return;
    }


    let feeder =
    document.getElementById("feederInput");


    feeder.innerHTML = "";


    let list = [];


    if(
    document.getElementById("mvType").checked
    ){

        list = [
            "CEA01",
            "CEA02",
            "CEA03",
            "CEA04",
            "CEA05"
        ];

    }
    else{


        list = [
            "LV001",
            "LV002",
            "LV003",
            "LV004",
            "LV005"
        ];


    }



    list.forEach(function(item){


        let option =
        document.createElement("option");


        option.value = item;


        option.textContent = item;


        feeder.appendChild(option);


    });


});



/*****************************************
 เปิดหน้ารายงาน PDF
******************************************/
function openReportModal(){


    let contractor =
    document.getElementById("contractorSelect")
    .value;


    if(!contractor){

        alert(
        "กรุณาเลือกผู้รับเหมาก่อน"
        );

        return;

    }


    let select =
    document.getElementById("reportFeeder");


    select.innerHTML =
    "<option value='ALL'>ทั้งหมด</option>";
    google.script.run

    .withSuccessHandler(function(list){


        list.forEach(function(item){


            let option =
            document.createElement("option");


            option.value =
            item;


            option.textContent =
            item;


            select.appendChild(option);


        });


        reportModal.show();


    })


    .withFailureHandler(function(err){


        alert(
        "โหลด Feeder ไม่สำเร็จ\n" +
        err.message
        );


    })


    .getFeederList(contractor);


}




/*****************************************
 สร้างรายงาน PDF
******************************************/
function printReport(){


    let filter = {


        contractor:
        document.getElementById(
        "contractorSelect"
        ).value,


        feeder:
        document.getElementById(
        "reportFeeder"
        ).value,


        keyword:
        document.getElementById(
        "reportKeyword"
        ).value.trim()


    };



    google.script.run


    .withSuccessHandler(function(data){


        let rows = "";


        data.forEach(function(item){


            let before = "";
            let after = "";


            if(item.photo){


                let img =
                item.photo.split("||");


                before =
                img[0] || "";


                after =
                img[1] || "";


            }



            rows += `

            <tr>

                <td>
                ${item.type}<br>
                ${item.feeder}
                </td>


                <td>
                ${item.job}
                </td>


                <td>

                ${
                before ?
                `<img src="${before}"
                style="
                width:120px;
                height:120px;
                object-fit:contain;">`
                :
                "-"
                }

                </td>


                <td>

                ${
                after ?
                `<img src="${after}"
                style="
                width:120px;
                height:120px;
                object-fit:contain;">`
                :
                "-"
                }

                </td>


            </tr>

            `;


        });



        let printWindow =
        window.open(
        "",
        "_blank"
        );



        printWindow.document.write(`

        <html>

        <head>

        <title>
        รายงานงานผู้รับเหมา
        </title>


        <style>

        body{

            font-family:
            Tahoma,
            sans-serif;

            padding:20px;

        }


        h2{

            text-align:center;

        }


        table{

            width:100%;

            border-collapse:collapse;

        }


        th,td{

            border:1px solid #000;

            padding:8px;

            text-align:center;

        }


        img{

            max-width:120px;

            max-height:120px;

        }
