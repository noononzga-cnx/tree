<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
    <h3>รายการงานในระบบ</h3>
    <div id="app" class="mt-3">กำลังเชื่อมต่อฐานข้อมูล...</div>

    <script>
        // นำ URL เว็บแอปใหม่ที่ Deploy ล่าสุดมาวางตรงนี้!
        const API_URL = "https://script.google.com/macros/s/AKfycbxXxD0kHtztBAX9iATzMMsK7g388HI_lBOw-ga5QyRr1GlvOZ1-oB1ka3dDBs1Mem_6/exec"; 

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let html = '<table class="table table-bordered"><thead><tr><th>ผู้รับเหมา</th><th>งาน</th></tr></thead><tbody>';
                data.forEach(item => {
                    html += `<tr><td>${item.contractor}</td><td>${item.job}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('app').innerHTML = html;
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="alert alert-danger">เกิดข้อผิดพลาด: ' + err + '<br>ตรวจสอบว่าได้ Deploy เป็น "ทุกคน" แล้วหรือยัง</div>';
            }
        }
        init();
    </script>
</body>
</html>
